<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOD TIER FINAL Portfolio</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>
<div class="cursor"></div>

<nav>
  <h2>GOD TIER</h2>
  <div>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#projects">Work</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<section class="hero" id="home">
  <div>
    <h1>God Tier UI</h1>
    <p>Ultimate Apple + Vision Pro Inspired Experience</p>
    <button class="btn">Enter Reality</button>
  </div>
</section>

<section id="about">
  <div>
    <h2>About</h2>
    <p>This is a cinematic, immersive, 3D glass UI portfolio built with pure HTML & CSS.</p>
  </div>
</section>

<section id="projects">
  <div>
    <h2>Work</h2>
    <div class="cards">
      <div class="card">Neural UI System</div>
      <div class="card">3D Web Experience</div>
      <div class="card">Immersive Portfolio</div>
    </div>
  </div>
</section>

<section id="contact">
  <div>
    <h2>Contact</h2>
    <input placeholder="Name">
    <input placeholder="Email">
    <textarea placeholder="Message"></textarea>
    <button class="btn">Send</button>
  </div>
</section>

<script>
document.addEventListener('mousemove',(e)=>{
  const c=document.querySelector('.cursor');
  c.style.left=e.clientX+'px';
  c.style.top=e.clientY+'px';
});
</script>

</body>
</html>
